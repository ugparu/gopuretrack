name: Lint

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          check-latest: true

      - name: golangci-lint
        # v7 of the action is the first release that supports golangci-lint v2.
        uses: golangci/golangci-lint-action@v7
        with:
          # Pin to a v2 minor line — the action resolves it to the latest
          # patch. Bump deliberately when adopting new v2 features.
          version: v2.11
